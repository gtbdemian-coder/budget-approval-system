spring.application.name=budgetapprovalsystem

# ===== H2 Database =====
spring.datasource.url=jdbc:h2:mem:budgetdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 콘솔 (브라우저에서 DB 확인용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== SQL 초기화 =====
spring.sql.init.mode=always

# ===== MyBatis =====
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.github.gtbdemian.budgetapproval.domain
mybatis.configuration.map-underscore-to-camel-case=true

# ===== 로깅 (SQL 확인용) =====
logging.level.com.github.gtbdemian.budgetapproval.mapper=DEBUG
